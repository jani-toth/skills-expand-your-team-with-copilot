name: "Remove Activity"
description: "Request to remove an extracurricular activity"
labels: ["enhancement"]
body:
  - type: input
    id: activity-name
    attributes:
      label: Activity Name
      placeholder: "e.g. Chess Club"
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason for Removal
      placeholder: "Why should this activity be removed?"
    validations:
      required: true

  - type: input
    id: effective-date
    attributes:
      label: Effective Date
      placeholder: "e.g. End of semester / June 2024 (optional)"
    validations:
      required: false
